{% extends "base.html" %}
{% block title %}Удаление мероприятия{% endblock %}

{% block content %}
<div class="p-4 bg-white rounded border">
  <h1 class="h5">Удаление мероприятия</h1>
  <p>Ты действительно хочешь удалить мероприятие <strong>{{ event.title }}</strong>?</p>

  <form method="post">
    {% csrf_token %}
    <button class="btn btn-danger">Удалить</button>
    <a href="{% url 'events:org_dashboard' %}" class="btn btn-outline-secondary">Отмена</a>
  </form>
</div>
{% endblock %}
