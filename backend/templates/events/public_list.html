{% extends "base.html" %}
{% block title %}Публичные мероприятия{% endblock %}
{% block content %}
<div class="p-4 bg-white rounded border">
  <h1 class="h5">Публичные мероприятия</h1>
  <ul class="mb-0">
    {% for e in events %}
      <li><strong>{{ e.title }}</strong> {% if e.city %}({{ e.city }}){% endif %}</li>
    {% empty %}
      <li class="text-muted">Пока нет мероприятий.</li>
    {% endfor %}
  </ul>
</div>
{% endblock %}
