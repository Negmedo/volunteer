<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>{% block title %}Волонтёры{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
  <div class="container">
    <a class="navbar-brand" href="/">СППР Волонтёров</a>
    <div class="ms-auto">
      {% if user.is_authenticated %}
        <a class="btn btn-outline-primary btn-sm" href="/accounts/dashboard/">Кабинет</a>
        <a class="btn btn-outline-danger btn-sm" href="/accounts/logout/">Выйти</a>
      {% else %}
        <a class="btn btn-outline-primary btn-sm" href="/accounts/login/">Вход</a>
        <a class="btn btn-primary btn-sm" href="/accounts/signup/">Регистрация</a>
      {% endif %}
    </div>
  </div>
</nav>

<div class="container py-4">
  {% block content %}{% endblock %}
</div>
</body>
</html>
