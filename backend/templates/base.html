{% load static %}
<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>{% block title %}Волонтёры{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'landing/css/main.css' %}">
  {% block extra_css %}{% endblock %}
</head>
<body class="bg-light">
<nav class="">
  <div class="header {% if request.resolver_match.url_name != 'landing' %}scrolled{% endif %}">
    <div class="header-left">
      <a class="navbar-brand" href="{% url 'landing' %}"><div class="logo">VolunteerSKO</div></a>
    </div>
    <div class="header-right">
      {% if user.is_authenticated %}
        <a class="btn btn-outline-primary btn-sm" href="{% url 'accounts:dashboard' %}">Кабинет</a>
        <form method="post" action="{% url 'accounts:logout' %}" class="d-inline">
          {% csrf_token %}
          <button type="submit" class="btn btn-outline-danger btn-sm">Выйти</button>
        </form>
      {% else %}
        <a class="btn btn-outline-primary btn-sm" href="{% url 'accounts:login' %}">Вход</a>
        <a class="btn btn-primary btn-sm" href="{% url 'accounts:signup' %}">Регистрация</a>
      {% endif %}
    </div>
  </div>
</nav>

<!-- <div class="container py-4"> -->
  <div>
  {% block content %}{% endblock %}
</div>
</body>
</html>
